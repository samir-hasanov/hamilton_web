apiVersion: apps/v1
kind: Deployment
metadata:
  name: hamilton-web
  namespace: hamilton
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hamilton-web
  template:
    metadata:
      labels:
        app: hamilton-web
    spec:
      containers:
        - name: hamilton-web
          image: samirhasanov/hamilton-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hamilton-web
  namespace: hamilton
spec:
  type: NodePort
  selector:
    app: hamilton-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
