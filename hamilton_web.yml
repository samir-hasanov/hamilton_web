apiVersion: apps/v1
kind: Deployment
metadata:
  name: hamilton-web
  namespace: hamilton
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hamilton-web
  template:
    metadata:
      labels:
        app: hamilton-web
    spec:
      containers:
        - name: web
          image: hamilton-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API_BASE
              value: "http://hamilton-backend:8085/api/v1"
---
apiVersion: v1
kind: Service
metadata:
  name: hamilton-web
  namespace: hamilton
spec:
  type: NodePort
  selector:
    app: hamilton-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
